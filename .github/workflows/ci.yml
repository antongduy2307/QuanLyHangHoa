name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Test on Windows
    runs-on: windows-latest
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure runtime directory
        shell: pwsh
        run: '"LOCALAPPDATA=$env:RUNNER_TEMP\QuanLyHangHoaTest" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        working-directory: ${{ github.workspace }}
        run: python -m unittest discover -s tests -p "test*.py" -t .

      - name: Compile Python files
        working-directory: ${{ github.workspace }}
        run: python -m compileall core modules tests shell
