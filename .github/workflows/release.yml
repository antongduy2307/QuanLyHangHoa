name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.7.3"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish Windows installer
    runs-on: windows-latest

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Configure runtime directory
        shell: pwsh
        run: '"LOCALAPPDATA=$env:RUNNER_TEMP\QuanLyHangHoaTest" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Check tag matches app version
        shell: pwsh
        run: .\scripts\check_version.ps1 -Tag $env:RELEASE_TAG

      - name: Run tests
        working-directory: ${{ github.workspace }}
        run: python -m unittest discover -s tests -p "test*.py" -t .

      - name: Compile Python files
        working-directory: ${{ github.workspace }}
        run: python -m compileall core modules tests shell

      - name: Build PyInstaller app
        shell: pwsh
        run: .\scripts\build_exe.ps1

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: .\scripts\build_installer.ps1

      - name: Create checksum
        shell: pwsh
        run: |
          $installer = Get-ChildItem dist\installer\QuanLyHangHoa-Setup-*.exe | Select-Object -First 1
          if ($null -eq $installer) { throw "Installer not found." }
          $hash = Get-FileHash -Algorithm SHA256 $installer.FullName
          "$($hash.Hash)  $($installer.Name)" | Set-Content -Encoding ascii dist\installer\SHA256SUMS.txt

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuanLyHangHoa-installer-${{ env.RELEASE_TAG }}
          path: |
            dist/installer/QuanLyHangHoa-Setup-*.exe
            dist/installer/SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist/installer/QuanLyHangHoa-Setup-*.exe
            dist/installer/SHA256SUMS.txt
